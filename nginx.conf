server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml video/mp4;
    gzip_min_length 256;

    # SPA fallback — todas las rutas al index
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # Assets con hash (cache inmutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Imágenes
    location /images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Video (gifs/animaciones)
    location /gif/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Accept-Ranges bytes;
    }
}
