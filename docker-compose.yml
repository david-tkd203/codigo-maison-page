# ============================================================
# Código Maison — Docker Compose
# ============================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_EMAILJS_PUBLIC_KEY: ${VITE_EMAILJS_PUBLIC_KEY:?err}
        VITE_EMAILJS_SERVICE_ID: ${VITE_EMAILJS_SERVICE_ID:?err}
        VITE_EMAILJS_TEMPLATE_TEAM: ${VITE_EMAILJS_TEMPLATE_TEAM:?err}
        VITE_EMAILJS_TEMPLATE_CLIENT: ${VITE_EMAILJS_TEMPLATE_CLIENT:?err}
    restart: unless-stopped
    ports:
      - "80"
