services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - codigomaison-net

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://web:80 --no-autoupdate
    depends_on:
      - web
    networks:
      - codigomaison-net
    profiles:
      - tunnel

networks:
  codigomaison-net:
    driver: bridge
